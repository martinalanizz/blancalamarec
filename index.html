  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0;\">·<\u002Fspan>\n    <\u002Fdiv>\n    <a href=\"https://instagram.com/blanca_lamar_ec\" target=\"_blank\" class=\"ig-a\" style=\"font-size:11px;font-weight:500;color:rgba(255,255,255,.26);letter-spacing:1.5px;transition:color .2s;\">@blanca_lamar_ec<\u002Fa>\n    <p style=\"font-size:10px;font-weight:300;color:rgba(255,255,255,.18);letter-spacing:.4px;\">{{ footerCopy }}<\u002Fp>\n  <\u002Fdiv>\n<\u002Ffooter>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { lang: 'es', openFaq: null, galIndex: 0 };\n\n  componentDidMount() {\n    // Gallery auto-rotate every 4s, paused on hover/touch\n    this._galPaused = false;\n    this._galTimer = setInterval(() => {\n      if (!this._galPaused) this.setState(s => ({ galIndex: (s.galIndex + 1) % 4 }));\n    }, 4000);\n\n    // 3. Nav: transparent → dark on scroll\n    const nav = document.querySelector('nav');\n    const onScroll = () => {\n      if (window.scrollY > 50) {\n        nav.style.background = 'rgba(45,10,78,.93)';\n        nav.style.backdropFilter = 'blur(20px)';\n        nav.style.borderBottomColor = 'rgba(201,168,76,.12)';\n      } else {\n        nav.style.background = 'transparent';\n        nav.style.backdropFilter = 'none';\n        nav.style.borderBottomColor = 'transparent';\n      }\n    };\n    window.addEventListener('scroll', onScroll, { passive: true });\n    onScroll();\n\n    // 1. Section fade-in on scroll\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.07, rootMargin: '0px 0px -28px 0px' });\n\n    setTimeout(() => {\n      document.querySelectorAll('[data-reveal]').forEach(el => {\n        const top = el.getBoundingClientRect().top;\n        if (top >= window.innerHeight * 0.88) {\n          el.style.opacity = '0';\n          el.style.transform = 'translateY(22px)';\n          el.style.transition = 'opacity 0.78s ease, transform 0.78s ease';\n          io.observe(el);\n        }\n      });\n    }, 120);\n  }\n\n  componentWillUnmount() {\n    clearInterval(this._galTimer);\n  }\n\n  renderVals() {\n    const { lang, openFaq, galIndex } = this.state;\n\n    const tx = {\n      es: {\n        nav: ['Inicio','Servicios','Nosotros','Galería','FAQ','Contacto'],\n        hero: {\n          overline: 'Grooming canino · Bridgeport, CT',\n          h1a: 'Tu mascota', h1b: 'merece', h1c: 'lo mejor.',\n          tagline: 'Cuidado especializado con amor y dedicación. Blanca Lamar, groomer certificada.',\n          cta1: 'Agendar cita', cta2: 'Ver servicios',\n          photoCaption: 'Retrato de Blanca',\n        },\n        svc: {\n          overline: 'Nuestros Servicios',\n          title: 'Lo que hacemos',\n          cta: 'Reservar',\n          items: [\n            { name: 'Baño & Cepillado',  desc: 'Limpieza profunda, secado y cepillado profesional.',       tag: '01' },\n            { name: 'Grooming Completo', desc: 'Baño, corte, uñas, oídos y acabado impecable.',            tag: '02' },\n            { name: 'Primera Visita',    desc: 'Una experiencia suave y positiva para cachorros.',          tag: '03' },\n            { name: 'Tratamiento Spa',   desc: 'Mascarillas, hidratación profunda y cuidados premium.',    tag: '04' },\n          ],\n        },\n        about: {\n          overline: 'Sobre mí',\n          title: 'Pasión por el bienestar animal',\n          p1: 'Soy Blanca Lamar, groomer certificada y fundadora de Lamar Grooming Studio en Bridgeport, CT. Mi camino comenzó con una convicción simple: el bienestar del animal siempre antes que la estética.',\n          quote: '«Cada mascota merece ser tratada con paciencia, respeto y amor genuino.»',\n          p2: 'Con años de experiencia en razas de todo tipo, desarrollé una metodología centrada en la calma y la confianza — cada visita es una experiencia positiva para tu perro.',\n          p3: 'Fundadora de Lamar Grooming Academy, donde formo a la próxima generación de groomers en nuestra comunidad.',\n          photoCaption: 'Blanca con su perro',\n        },\n        gallery: {\n          overline: 'Galería',\n          title: 'Resultados que hablan\\npor sí solos.',\n          captions: ['Poodle · Grooming Completo','Pomerania · Baño & Cepillado','Papillón · Corte de Verano','Bichón · Color Fantasía'],\n        },\n        faq: {\n          overline: 'Preguntas frecuentes',\n          title: 'Todo lo que necesitas saber',\n          items: [\n            { q:'¿Cómo agendo una cita?',          a:'Contáctanos directamente por WhatsApp o Instagram (@blanca_lamar_ec). Te respondemos rápidamente para coordinar el horario más conveniente.' },\n            { q:'¿Qué debo traer a la cita?',       a:'Trae a tu mascota con su historial de vacunas al día (requerido). Si tiene sensibilidades o productos favoritos, coméntanoslo al reservar.' },\n            { q:'¿Trabajan con todas las razas?',   a:'Sí. Tenemos experiencia con una amplia variedad de razas, de pequeñas a grandes, adaptándonos a cada tipo de pelaje y temperamento.' },\n            { q:'¿Cuánto dura una sesión?',         a:'Un baño básico toma entre 1 y 2 horas; un grooming completo, entre 2 y 4 horas. Te damos un estimado al reservar.' },\n            { q:'¿Ofrecen servicio de transporte?', a:'Por el momento no ofrecemos transporte, pero estamos en Bridgeport, CT. Escríbenos para los detalles de ubicación.' },\n            { q:'¿Qué productos utilizan?',         a:'Solo productos de grooming de calidad profesional, seguros y suaves para la piel y el pelaje. Si tu perro tiene alergias, infórmanos con anticipación.' },\n          ],\n        },\n        contact: {\n          overline: 'Contacto', title: 'Reserva tu cita hoy',\n          phone: '929-710-3525', wa: 'Escribir por WhatsApp',\n          loc: 'Bridgeport, CT', instNote: 'También puedes reservar por Instagram',\n        },\n        footer: { copy: '© 2025 Lamar Grooming Studio. Todos los derechos reservados.' },\n      },\n      en: {\n        nav: ['Home','Services','About','Gallery','FAQ','Contact'],\n        hero: {\n          overline: 'Canine grooming · Bridgeport, CT',\n          h1a: 'Your pet', h1b: 'deserves', h1c: 'the best.',\n          tagline: 'Specialized care with love and dedication. Blanca Lamar, certified groomer.',\n          cta1: 'Book now', cta2: 'See services',\n          photoCaption: 'Portrait of Blanca',\n        },\n        svc: {\n          overline: 'Our Services',\n          title: 'What we do',\n          cta: 'Book',\n          items: [\n            { name: 'Bath & Brush',      desc: 'Deep cleanse, blow-dry, and professional brushing.',   tag: '01' },\n            { name: 'Full Grooming',     desc: 'Bath, haircut, nails, ears, and a flawless finish.',   tag: '02' },\n            { name: 'Puppy First Groom', desc: 'A gentle, positive first experience for puppies.',     tag: '03' },\n            { name: 'Spa Treatment',     desc: 'Masks, deep conditioning, and premium coat care.',     tag: '04' },\n          ],\n        },\n        about: {\n          overline: 'About me',\n          title: 'Passion for animal well-being',\n          p1: `I'm Blanca Lamar, a certified groomer and founder of Lamar Grooming Studio in Bridgeport, CT. My path began with a simple conviction: the animal's well-being always comes before aesthetics.`,\n          quote: '\"Every pet deserves to be treated with patience, respect, and genuine love.\"',\n          p2: `With years of experience across all breeds, I developed a methodology centered on calm and trust — every visit is a positive experience for your dog.`,\n          p3: `Founder of Lamar Grooming Academy, where I train the next generation of professional groomers in our community.`,\n          photoCaption: 'Blanca with her dog',\n        },\n        gallery: {\n          overline: 'Gallery',\n          title: 'Results that\\nspeak for themselves.',\n          captions: ['Poodle · Full Grooming','Pomeranian · Bath & Brush','Papillon · Summer Cut','Bichon · Fantasy Color'],\n        },\n        faq: {\n          overline: 'Frequently asked questions',\n          title: 'Everything you need to know',\n          items: [\n            { q:'How do I book an appointment?', a:`Contact us via WhatsApp or Instagram (@blanca_lamar_ec). We'll reply quickly to find the most convenient time for you.` },\n            { q:'What should I bring?',          a:`Bring your pet with up-to-date vaccination records (required). If your dog has sensitivities or favorite products, mention it when booking.` },\n            { q:'Do you groom all breeds?',      a:`Yes. We have experience with a wide variety of breeds, small to large, adapting to each coat type and temperament.` },\n            { q:'How long does a session take?', a:`A basic bath takes 1–2 hours; a full grooming, 2–4 hours. We'll give you an estimate when you book.` },\n            { q:'Do you offer transportation?',  a:`We don't currently offer transportation, but we're in Bridgeport, CT. Message us for location details.` },\n            { q:'What products do you use?',     a:`We use professional-grade grooming products only — gentle and safe for skin and coat. If your dog has allergies, please let us know in advance.` },\n          ],\n        },\n        contact: {\n          overline: 'Contact', title: 'Book your appointment today',\n          phone: '929-710-3525', wa: 'Message on WhatsApp',\n          loc: 'Bridgeport, CT', instNote: 'You can also book on Instagram',\n        },\n        footer: { copy: '© 2025 Lamar Grooming Studio. All rights reserved.' },\n      },\n    };\n\n    const t = tx[lang];\n    const hrefs = ['#hero','#services','#about','#gallery','#faq','#contact'];\n\n    const navItems  = t.nav.map((label, i) => ({ label, href: hrefs[i] }));\n    const svcItems  = t.svc.items.map(it => ({ name: it.name, desc: it.desc, tag: it.tag }));\n    const caps = t.gallery.captions;\n    const nCards = 4;\n    const clsFor = (i) => {\n      const diff = ((i - galIndex) % nCards + nCards) % nCards;\n      if (diff === 0) return 'cf-center';\n      if (diff === 1) return 'cf-right';\n      if (diff === nCards - 1) return 'cf-left';\n      return 'cf-back';\n    };\n    const galNext  = () => this.setState(s => ({ galIndex: (s.galIndex + 1) % nCards }));\n    const galPrev  = () => this.setState(s => ({ galIndex: (s.galIndex - 1 + nCards) % nCards }));\n    const faqItems  = t.faq.items.map((it, i) => ({\n      q:       it.q,\n      a:       it.a,\n      maxH:    openFaq === i ? '300px' : '0px',\n      opacity: openFaq === i ? '1' : '0',\n      rot:     openFaq === i ? 'rotate(180deg)' : 'rotate(0deg)',\n      toggle:  () => this.setState(s => ({ openFaq: s.openFaq === i ? null : i })),\n    }));\n\n    return {\n      esColor: lang === 'es' ? '#C9A84C' : 'rgba(255,255,255,.3)',\n      enColor: lang === 'en' ? '#C9A84C' : 'rgba(255,255,255,.3)',\n      toggleLang: () => this.setState(s => ({ lang: s.lang === 'es' ? 'en' : 'es' })),\n      navItems,\n\n      heroOverline:     t.hero.overline,\n      heroH1a:          t.hero.h1a,\n      heroH1b:          t.hero.h1b,\n      heroH1c:          t.hero.h1c,\n      heroTagline:      t.hero.tagline,\n      heroCta1:         t.hero.cta1,\n      heroCta2:         t.hero.cta2,\n      heroPhotoCaption: t.hero.photoCaption,\n\n      svcOverline: t.svc.overline,\n      svcTitle:    t.svc.title,\n      svcCta:      t.svc.cta,\n      svcItems,\n\n      aboutOverline:     t.about.overline,\n      aboutTitle:        t.about.title,\n      aboutP1:           t.about.p1,\n      aboutQuote:        t.about.quote,\n      aboutP2:           t.about.p2,\n      aboutP3:           t.about.p3,\n      aboutPhotoCaption: t.about.photoCaption,\n\n      galOverline: t.gallery.overline,\n      galTitle:    t.gallery.title,\n      galCls0: clsFor(0), galCls1: clsFor(1), galCls2: clsFor(2), galCls3: clsFor(3),\n      galCap0: caps[0], galCap1: caps[1], galCap2: caps[2], galCap3: caps[3],\n      galNext, galPrev,\n      galPause:  () => { this._galPaused = true; },\n      galResume: () => { this._galPaused = false; },\n      galTouchStart: (e) => { this._touchX = e.changedTouches[0].clientX; this._galPaused = true; },\n      galTouchEnd: (e) => {\n        const dx = e.changedTouches[0].clientX - (this._touchX || 0);\n        if (Math.abs(dx) >= 50) {\n          this.setState(s => ({ galIndex: (s.galIndex + (dx < 0 ? 1 : nCards - 1)) % nCards }));\n        }\n        setTimeout(() => { this._galPaused = false; }, 300);\n      },\n\n      faqOverline: t.faq.overline,\n      faqTitle:    t.faq.title,\n      faqItems,\n\n      ctxOverline: t.contact.overline,\n      ctxTitle:    t.contact.title,\n      ctxPhone:    t.contact.phone,\n      ctxWhatsapp: t.contact.wa,\n      ctxLocation: t.contact.loc,\n      ctxInstNote: t.contact.instNote,\n\n      footerCopy: t.footer.copy,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
